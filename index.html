<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/resetAI.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Project 2</title>
</head>
<body>
    <header class="header">
        <div class="wrapper header__container">

            <div class="header__nav-left">
                <a href="#" class="header__logo-link">
                    <img src="/img/icons/logo.svg" alt="Landify" class="header__logo">
                </a>
                <nav class="header__nav">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a href="#" class="nav__item-link">
                                Features
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#" class="nav__item-link">
                                Pricing
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#" class="nav__item-link">
                                Careers
                            </a>
                        </li>
                        <li class="nav__item">
                            <a href="#" class="nav__item-link">
                                Help
                            </a>
                        </li>  
                    </ul>
                </nav>
            </div>

            <div class="header__nav-right">
                <a href="#" class="header__badge-link">
                    <img src="/img/icons/GPbadge.png" alt="Google Play" class="header__badge">
                </a>
                <a href="#" class="header__badge-link">
                    <img src="/img/icons/ASbadge.png" alt="App Store" class="header__badge">
                </a>
            </div>

            <div class="header__burger">
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
                <span class="header__burger-line"></span>
            </div>
        </div>
    </header>

    <main class="main">

        <section class="hero">
            <div class="wrapper hero__container">

                <div class="hero__content">

                    <div class="hero__content-text">
                        <h1 class="hero__title">
                            The easiest way to manage projects
                        </h1>
                        <p class="hero__description">
                            From the small stuff to the big picture, organizes the work so teams know what to do, why it matters, and how to get it done.
                        </p>
                    </div>

                    <div class="hero__content-actions">
                        <a href="#" class="btn-primary hero__btn">
                            Get Started
                        </a>
                        <a href="#" class="btn-primary hero__btn-video">
                            <img src="/img/icons/watch-icon.svg" alt="" class="hero__btn-icon">
                            Watch Video
                        </a>
                    </div>

                </div>

                <div class="hero__preview">
                    <img src="/img/hero-mobile.png" alt="Phone Mockup" class="hero__preview-img">
                </div>

            </div>
        </section>

    </main>
</body>
</html>
